<!DOCTYPE html>
<html>
<head>
    <title>DailyWord</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; padding: 20px; background: #f0f8ff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        h1 { color: #333; text-align: center; }
    </style>
</head>
<body>
<!DOCTYPE html>
<html>
<head><title>DailyWord Login</title></head>
<body>
    <h1>DailyWord - Aprenda Inglês Diário</h1>
    <form id="loginForm">
        <input type="email" id="email" placeholder="raphael@example.com" required><br><br>
        <input type="password" id="password" placeholder="12345678" required><br><br>
        <button type="submit">Login</button>
    </form>
    <p><small>Não tem conta? <a href="/docs" target="_blank">Registre via API</a></small></p>
    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams({username: email, password})
            });
            const data = await res.json();
            if (data.access_token) {
                localStorage.setItem('token', data.access_token);
                window.location = '/dashboard';
            } else {
                alert('Erro: ' + (data.detail || 'Login falhou'));
            }
        } catch(err) { alert('Erro conexão'); }
    });
    </script>
</body>
</html>
